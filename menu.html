<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu — Sweet Retreat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Josefin+Serif:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,300;0,400;1,300&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #e8a0b4;
    --deep-rose: #c4607a;
    --cream: #fdf6f0;
    --dark: #1a1015;
    --charcoal: #2d2028;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Raleway', sans-serif;
    background: var(--dark);
    color: var(--cream);
    overflow-x: hidden;
  }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.4rem 4rem;
    background: rgba(26,16,21,0.97);
    backdrop-filter: blur(2px);
  }

  .nav-logo {
    font-family: 'Josefin Serif', serif;
    font-size: 1.6rem; letter-spacing: 0.02em;
    color: var(--cream); text-decoration: none;
  }
  .nav-logo span { color: var(--rose); font-style: italic; }

  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a {
    font-size: 0.82rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.75); text-decoration: none; transition: color 0.3s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--rose); }

  .nav-cta {
    background: var(--deep-rose); color: white;
    padding: 0.65rem 1.6rem; border-radius: 2px;
    font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase;
    text-decoration: none; transition: background 0.3s;
  }
  .nav-cta:hover { background: var(--rose); }

  .menu-header {
    padding: 10rem 4rem 4rem;
    text-align: center;
  }

  .menu-eyebrow {
    font-size: 0.72rem; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--rose); margin-bottom: 1.2rem;
  }

  .menu-title {
    font-family: 'Josefin Serif', serif;
    font-size: clamp(3rem, 7vw, 5.5rem);
    color: var(--cream); line-height: 1.05;
  }
  .menu-title em { color: var(--rose); font-style: italic; }

  .menu-divider {
    width: 60px; height: 1px;
    background: var(--rose);
    margin: 2rem auto 0;
  }

  .menu-boards {
    display: flex; flex-direction: column; gap: 4rem;
    max-width: 1100px; margin: 0 auto;
    padding: 4rem 4rem 8rem;
  }

  .menu-board {
    position: relative;
  }

  .menu-board img {
    width: 100%; display: block;
    border-radius: 4px;
    box-shadow: 0 12px 60px rgba(0,0,0,0.5);
  }

  .menu-board-label {
    font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--rose); margin-bottom: 1rem;
  }

  @media (max-width: 768px) {
    nav { padding: 1.2rem 2rem; }
    .nav-links { display: none; }
    .menu-header { padding: 8rem 2rem 3rem; }
    .menu-boards { padding: 3rem 1.5rem 5rem; gap: 3rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Sweet <span>Retreat</span></a>
  <ul class="nav-links">
    <li><a href="index.html#about">Our Story</a></li>
    <li><a href="menu.html" class="active">Menu</a></li>
    <li><a href="index.html#reviews">Reviews</a></li>
    <li><a href="index.html#visit">Visit</a></li>
  </ul>
  <a href="index.html#visit" class="nav-cta">Find Us</a>
</nav>

<div class="menu-header">
  <p class="menu-eyebrow">Sweet Retreat Rochester</p>
  <h1 class="menu-title">Our <em>Menu</em></h1>
  <div class="menu-divider"></div>
</div>

<div class="menu-boards">
  <div class="menu-board">
    <p class="menu-board-label">Favorites</p>
    <img src="menu-favorites.png" alt="Sweet Retreat's Favorites">
  </div>
  <div class="menu-board">
    <p class="menu-board-label">Drinks</p>
    <img src="menu-drinks.png" alt="Drink Menu">
  </div>
  <div class="menu-board">
    <p class="menu-board-label">Crepes, Waffles & More</p>
    <img src="menu-food.png" alt="Full Food Menu">
  </div>
</div>

</body>
</html>
